{% extends 'base.html' %}
{% block content %}
<div class="container py-4">
    <div class="card shadow-sm border-0 p-4">
        <h5 class="fw-bold mb-4">{{ title }}</h5>
        <div style="height: 400px;">
            <canvas id="termStructureChart"></canvas>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net"></script>

<script>
    document.addEventListener("DOMContentLoaded", function() {
        new Chart(document.getElementById('termStructureChart'), {
            type: 'bar',
            data: {
                labels: {{ labels|safe }},
                datasets: [{
                    label: 'Rate (%)',
                    data: {{ rates|safe }},
                    backgroundColor: '#C83C0D',
                    borderColor: '#1a1a1a',
                    borderWidth: 1,
                    borderRadius: 4
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    y: { 
                        beginAtZero: false, // Better for seeing small rate moves
                        title: { display: true, text: 'Interest Rate (%)' } 
                    },
                    x: { title: { display: true, text: 'Tenor (Years)' } }
                }
            }
        });
    });
</script>
{% endblock %}
