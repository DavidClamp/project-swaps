{% extends 'base.html' %}

{% block title %}500 - System Recalibrating | IRSQuant{% endblock %}

{% block content %}
<div class="container d-flex flex-column justify-content-center align-items-center vh-100 text-center">
    
    <!-- Pulse Animation Icon: Navy Circle with Gold Gear -->
    <div class="p-4 rounded-circle mb-4 shadow-lg pulse-bg" style="background-color: var(--ua-navy);">
        <i class="fa-solid fa-gears fa-5x" style="color: var(--ua-gold);"></i>
    </div>

    <h1 class="display-1 fw-bold text-dark">500</h1>
    <h3 class="fw-bold mb-3 brand-orange text-uppercase">System Recalibrating</h3>
    
    <p class="text-muted mb-4 px-3 fs-5" style="max-width: 600px;">
         **Quant engine** encountered an unexpected variance. 
    </p>

    <!-- Navigation Safety Net -->
    <div class="d-grid gap-3 d-sm-flex justify-content-sm-center">
        <a href="{% url 'dashboard' %}" class="btn btn-ua-gold btn-lg px-5 shadow-sm">
            <i class="fa-solid fa-rotate me-2"></i>Retry Dashboard
        </a>
        <a href="https://github.com{{ your_github_username }}/project-swaps/issues" 
           target="_blank" class="btn btn-outline-primary btn-lg px-5" 
           style="border-color: var(--ua-blue); color: var(--ua-blue);">
            Report Issue
        </a>
    </div>
</div>

<style>
    /* Subtle pulse to show the "engine" is still alive */
    .pulse-bg {
        animation: pulse 2s infinite;
    }
    @keyframes pulse {
        0% { transform: scale(1); }
        50% { transform: scale(1.05); }
        100% { transform: scale(1); }
    }
</style>
{% endblock %}
