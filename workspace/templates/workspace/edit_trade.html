{% extends 'base.html' %}
{% block content %}
<div class="container mt-5">
    <!-- Blue top border added -->
    <div class="card shadow-sm border-0 mx-auto" style="max-width: 600px; border-top: 4px solid var(--ua-blue);">
        <div class="card-header py-3" style="background-color: var(--ua-navy); color: white;">
            <h5 class="mb-0 fw-bold">
                <i class="fa-solid fa-pen-to-square me-2" style="color: var(--ua-gold);"></i> 
                Edit Trade Ticket: <span style="color: var(--ua-gold);">{{ trade.trade_id }}</span>
            </h5>
        </div>
        <div class="card-body p-4">
            <form method="POST">
                {% csrf_token %}
                {{ form.as_p }}
                <div class="d-grid gap-2 mt-4">
                    <button type="submit" class="btn fw-bold shadow-sm" 
                            style="background-color: var(--ua-gold); color: var(--ua-navy); border: none;">
                        Update & Re-price
                    </button>
                    <a href="{% url 'blotter' %}" class="btn btn-outline-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
