{% extends 'base.html' %}

{% block content %}
<div class="w-100 min-vh-100 d-flex align-items-center bg-light">
    <div class="container py-5">
        <!-- 1. Main Card -->
        <div class="card shadow-lg border-0 mx-auto card-edit-trade text-white" 
             style="max-width: 600px; background-color:var(--ua-navy); border: 1px solid #444;">
            
            <!-- 2. Header -->
            <div class="card-header py-4 text-center" 
                 style="background-color: var(--ua-blue); border-bottom: 1px solid #444;">
                <h1 class="h4 mb-0 fw-bold" style="color: var(--ua-gold);">
                    <i class="fa-solid fa-pen-to-square me-2"></i>
                    Edit Trade Ticket
                </h1>
                <span class="badge bg-light text-dark mt-2 shadow-sm">
                    ID: {{ trade.trade_id }}
                </span>
            </div>

            <div class="card-body p-5">
                <form method="POST">
                    {% csrf_token %}
                    <div class="trade-form-labels text-white">
                        {{ form.as_p }}
                    </div>

                    <div class="d-grid gap-3 mt-5 pt-3" style="border-top: 1px solid #444;">
                        <button type="submit" class="btn btn-ua-gold fw-bold py-3 w-100 text-dark">
                            <i class="fa-solid fa-check-double me-2"></i>Update & Re-price
                        </button>
                        <a href="{% url 'blotter' %}" class="btn btn-ua-gold fw-bold w-100 py-2">
                            Cancel and Return
                        </a>
                    </div>
                </form>
            </div>
        </div> <!-- Card ends here -->
    </div>
</div>
{% endblock %}
