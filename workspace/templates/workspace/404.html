{% extends 'base.html' %}

{% block title %}404 - Safety Net | IRSQuant{% endblock %}

{% block content %}
<div class="container d-flex flex-column justify-content-center align-items-center vh-100 text-center">
    
    <!-- Large Branding Icon: Navy Circle with Gold Drafting Compass -->
    <div class="p-4 rounded-circle mb-4 shadow-lg" style="background-color: var(--ua-navy);">
        <i class="fa-solid fa-compass-drafting fa-5x" style="color: var(--ua-gold);"></i>
    </div>

    <h1 class="display-1 fw-bold text-dark">404</h1>
    <h3 class="fw-bold mb-3 brand-orange text-uppercase">Safety Net</h3>
    
    <p class="text-muted mb-4 px-3 fs-5" style="max-width: 600px;">
        The requested URL was not found. 
        Let's go back to the trading terminal.
    </p>

    <!-- Navigation Safety Net -->
    <div class="d-grid gap-3 d-sm-flex justify-content-sm-center">
        <a href="{% url 'dashboard' %}" class="btn btn-ua-gold btn-lg px-5 shadow-sm">
            <i class="fa-solid fa-chart-line me-2"></i>Return to Dashboard
        </a>
        <a href="{% url 'blotter' %}" class="btn btn-outline-primary btn-lg px-5" 
           style="border-color: var(--ua-blue); color: var(--ua-blue);">
            View Blotter
        </a>
    </div>
</div>
{% endblock %}
