{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}Execute Trade | IRSQuant{% endblock %}

{% block content %}
<div class="container py-5 mt-4">
    <div class="row justify-content-center">
        <div class="col-lg-7">
            <!-- Header Section -->
            <div class="d-flex align-items-center mb-4 border-bottom pb-3">
                <div class="p-3 rounded me-3 card-access-dark">
                    <!-- Icon forced to Gold for Navy background contrast -->
                    <i class="fa-solid fa-file-invoice-dollar fa-xl text-ua-gold"></i>
                </div>
                <div>
                    <h1 class="h3 mb-0 fw-bold">Trade <span class="brand-orange">Execution</span></h1>
                    <p class="text-muted mb-0 small">Enter contract details for QuantLib valuation.</p>
                </div>
            </div>

            <!-- Form Card -->
            <div class="card shadow-sm border-0 overflow-hidden" style="background-color: white;">
                <div class="card-body p-4 p-md-5">
                    <form method="POST" class="needs-validation" novalidate>
                        {% csrf_token %}

                        <div class="row g-3">
                            {{ form|crispy }}
                        </div>

                        <!-- Action Row -->
                        <div class="mt-4 pt-3 border-top d-flex gap-2">
                            <button type="submit" class="btn btn-ua-gold px-4 py-2 flex-grow-1 shadow-sm">
                                <i class="fa-solid fa-check-double me-2"></i>Execute & Price
                            </button>
                            <a href="{% url 'blotter' %}" class="btn btn-outline-secondary px-4 py-2">
                                Cancel
                            </a>
                        </div>
                    </form>
                </div>

                <!-- Footer Info Bar -->
                <div class="card-footer border-0 py-3 text-center bg-light">
                    <small class="text-muted">
                        <i class="fa-solid fa-shield-halved me-1 text-primary"></i>
                        Valuation derived from latest 
                        <strong class="text-dark">SOFR Zero Curve</strong>
                    </small>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
