{% extends 'base.html' %}

{% block title %}Curve Analyser{% endblock %}

{% block content %}
<div class="container-fluid">
    <div class="row">
        <!-- Main Chart Area -->
        <div class="col-lg-9">
            <div class="card shadow-sm border-0 p-4 mb-4 bg-white">
                <h2 class="h5 fw-bold mb-4 border-bottom pb-2 text-dark">
                    USD SOFR <span class="text-primary">Zero Curve</span>
                </h2>
                
                <div style="position: relative; height: 450px; width: 100%;">
                    <canvas id="yieldCurve"></canvas>
                </div>
            </div>
        </div>

        <!-- Sidebar / Control Panel -->
        <div class="col-lg-3">
            <div class="card p-4 shadow-sm border-0 bg-white text-dark">
                <h2 class="h5 fw-bold mb-3 text-dark">Data Controls</h2>  
                
                <!-- Primary Action -->
                <form action="{% url 'refresh_data' %}" method="POST">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-primary w-100 shadow-sm fw-bold py-2">
                       <i class="fa-solid fa-arrows-rotate me-2"></i>Refresh Market Data
                    </button>
                </form>

                <!-- Status Indicator -->
                <div class="mt-4 p-3 bg-white rounded border">
                    <p class="small mb-0 text-dark">
                        Source: BlueGamma JSON
                    </p>
                </div>

            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>

<script>
    document.addEventListener("DOMContentLoaded", function () {
        const canvas = document.getElementById('yieldCurve');
        if (!canvas) return;

        // Data Injection
        const labels = {{ tenors|safe }};
        const dataPoints = {{ rates|safe }};

        new Chart(canvas, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [{
                    label: 'Zero Rate (%)',
                    data: dataPoints,
                    borderColor: '#0057B7', 
                    backgroundColor: 'rgba(0, 87, 183, 0.1)', 
                    fill: true,
                    borderWidth: 3,
                    tension: 0.4,
                    pointRadius: 4,
                    pointBackgroundColor: '#fff',
                    pointBorderColor: '#0057B7',
                    pointBorderWidth: 2,
                    pointHoverRadius: 6
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                interaction: {
                    mode: 'index',
                    intersect: false,
                },
                plugins: {
                    legend: { display: false },
                    tooltip: {
                        backgroundColor: 'rgba(33, 37, 41, 0.95)',
                        titleColor: '#fff',
                        bodyColor: '#fff',
                        padding: 10,
                        callbacks: {
                            label: function(context) {
                                return context.parsed.y.toFixed(2) + '%'; 
                            }
                        }
                    }
                },
                scales: {
                    x: {
                        grid: { color: '#f0f0f0' },
                        ticks: { 
                            color: '#495057', 
                            font: { weight: '500' }
                        },
                        title: {
                            display: true,
                            text: 'Tenor (Years)',
                            color: '#212529', 
                            font: { weight: 'bold' }
                        }
                    },
                    y: {
                        grid: { color: '#f0f0f0' },
                        ticks: {
                            color: '#495057', 
                            callback: function(value) {
                                return value.toFixed(2) + '%'; 
                            }
                        },
                        title: {
                            display: true,
                            text: 'Zero Rate',
                            color: '#212529', 
                            font: { weight: 'bold' }
                        },
                        beginAtZero: false
                    }
                }
            }
        });
    });
</script>
{% endblock %}
