{% extends 'base.html' %}

{% block title %}Curve Analyser{% endblock %}

{% block content %}
<div class="container-fluid">
    <div class="row">
        <!-- Main Chart Area -->
        <div class="col-lg-9">
            <div class="card shadow-sm border-0 p-4 mb-4">
                <h5 class="text-muted border-bottom pb-2">USD SOFR Zero Curve</h5>
                <canvas id="yieldCurve" style="max-height: 450px;"></canvas>
            </div>
        </div>

        <!-- Sidebar / Metrics Area -->
        <div class="col-lg-3">
            <div class="card p-4 shadow-sm border-0 bg-dark text-white">
                <h5>Curve Metrics</h5>
                <hr class="border-secondary">
                
                <div class="d-flex justify-content-between mb-2">
                    <span>2Y vs 10Y Slope:</span>
                    <span class="text-warning">+42 bps</span>
                </div>
                
                <!-- The Secure Refresh Form -->
                <form action="{% url 'refresh_data' %}" method="POST" class="mt-3">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-warning w-100 shadow-sm">
                        <i class="fa-solid fa-arrows-rotate me-2"></i>Refresh Market Data
                    </button>
                </form>
                
                <p class="text-muted small mt-2 mb-0">
                    <i class="fa-solid fa-info-circle me-1"></i> 
                    Updates from <strong>BlueGamma JSON</strong>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
{% block extra_js %}
<!-- Fixed Chart.js Link -->
<script src="https://cdn.jsdelivr.net"></script>

<script>
    document.addEventListener("DOMContentLoaded", function() {
        const canvas = document.getElementById('yieldCurve');
        if (!canvas) return;

        // Ensure Chart.js is loaded
        if (typeof Chart === 'undefined') {
            console.error('Chart.js failed to load');
            return;
        }

        const labels = {{ tenors|safe }};
        const dataPoints = {{ rates|safe }};

        new Chart(canvas, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [{
                    label: 'Zero Rate (%)',
                    data: dataPoints,
                    borderColor: '#C83C0D', 
                    backgroundColor: 'rgba(200, 60, 13, 0.05)',
                    borderWidth: 3,
                    pointRadius: 5,
                    pointBackgroundColor: '#C83C0D',
                    tension: 0.3, 
                    fill: true
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { display: false }
                },
                scales: {
                    y: { 
                        title: { display: true, text: 'Zero Rate (%)', font: { weight: 'bold' } },
                        beginAtZero: false 
                    },
                    x: { 
                        title: { display: true, text: 'Tenor (Years)', font: { weight: 'bold' } } 
                    }
                }
            }
        });
    });
</script>
{% endblock %}
