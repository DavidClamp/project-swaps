{% extends 'base.html' %}
{% block content %}
<div class="container mt-5">
    <div class="card border-danger shadow-sm mx-auto" style="max-width: 500px; border-top: 5px solid #dc3545;">
        <div class="card-body text-center p-5">
            <i class="fa-solid fa-triangle-exclamation text-danger fa-3x mb-3"></i>
            <h3 class="fw-bold">Confirm Deletion</h3>
            <p class="text-muted">Delete trade <strong>{{ trade.trade_id }}</strong>? This will remove it from all strategy NPV aggregations.</p>
            <form method="POST">
                {% csrf_token %}
                <button type="submit" class="btn btn-danger px-4">Yes, Delete</button>
                <a href="{% url 'blotter' %}" class="btn btn-outline-secondary px-4">Cancel</a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
