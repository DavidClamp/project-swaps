{% extends 'base.html' %}

{% block content %}
<div class="container py-4">
    <!-- Main Card Container: -->
    <div class="card shadow-sm border-0 p-4">
        <!-- Header: -->
        <h1 class="h5 fw-bold mb-4 border-bottom pb-2 text-dark">
            USD SOFR <span class="brand-orange">1Y Distribution</span>
        </h1>
        <!-- Chart Container: -->
        <div id="chartContainer" style="position: relative; height:400px; width:100%">
            <canvas id="histChart"></canvas>
        </div>

        <!-- Stats Footer -->
        <div class="mt-3 pt-3 border-top d-flex justify-content-around text-center">
            <div>
                <small class="text-muted d-block">Sample Size</small>
                <span class="fw-bold text-dark">{{ sample_size }} Days</span>
            </div>
            <div>
                <small class="text-muted d-block">Mean Rate</small>
                <span class="fw-bold brand-orange">{{ mean_val }}%</span>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>

<script>
    document.addEventListener("DOMContentLoaded", function () {
        const ctx = document.getElementById('histChart').getContext('2d');
        const labels = {{ hist_labels|safe }};
        const counts = {{ hist_counts|safe }};

        new Chart(ctx, {
            type: 'bar',
            data: {
                labels: labels,
                datasets: [{
                    label: 'Frequency (Days)',
                    data: counts,
                    backgroundColor: '#0057B7', // UA Blue 
                    borderColor: '#002d5e',     // UA Navy 
                    borderWidth: 1,
                    borderRadius: 4
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { display: false } // Cleaner for single-dataset histograms
                },
                scales: {
                    y: { 
                        beginAtZero: true,
                        title: { display: true, text: 'Frequency (Days)', color: '#1a1a1a' }
                    },
                    x: {
                        title: { display: true, text: 'Rate Levels (%)', color: '#1a1a1a' },
                        ticks: { color: '#1a1a1a' }
                    }
                }
            }
        });
    });
</script>
{% endblock %}
