{% extends 'base.html' %}

{% block content %}
<div class="container py-4">
    <div class="card shadow-sm border-0 p-4">
        <h5 class="fw-bold mb-4">{{ title }}</h5>
        
        <!-- Chart.js needs an explicit height -->
        <div style="position: relative; height:400px; width:100%">
            <canvas id="histChart"></canvas>
        </div>

        <!-- Stats Footer -->
        <div class="mt-3 pt-3 border-top d-flex justify-content-around text-center">
            <div>
                <small class="text-muted d-block">Sample Size</small>
                <span class="fw-bold text-dark">{{ sample_size }} Days</span>
            </div>
            <div>
                <small class="text-muted d-block">Mean Rate</small>
                <span class="fw-bold brand-orange">{{ mean_val }}%</span>
            </div>
        </div>
    </div>
</div>

<!-- Ensure Chart.js is loaded at the bottom -->
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>

<script>
    document.addEventListener("DOMContentLoaded", function() {
        const ctx = document.getElementById('histChart').getContext('2d');
        
        // Use |safe to prevent Django from escaping the JSON quotes
        const labels = {{ hist_labels|safe }};
        const counts = {{ hist_counts|safe }};

        new Chart(ctx, {
            type: 'bar',
            data: {
                labels: labels,
                datasets: [{
                    label: 'Frequency (Days)',
                    data: counts,
                    backgroundColor: 'rgba(200, 60, 13, 0.8)',
                    borderColor: '#C83C0D',
                    borderWidth: 1,
                    barPercentage: 1.0,  
                    categoryPercentage: 1.0
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    y: { beginAtZero: true },
                    x: { title: { display: true, text: 'Rate Levels (%)' } }
                }
            }
        });
    });
</script>
{% endblock %}
