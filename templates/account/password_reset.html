{% extends "base.html" %}
{% load i18n %}{% load crispy_forms_tags %}

{% block content %}
<div class="container py-5 mt-5">
    <div class="row justify-content-center">
        <div class="col-md-5 card shadow-lg border-0 card-access-dark p-4 text-center">
            <h1 class="brand-orange fw-bold h3 mb-4">{% trans "Password Reset" %}</h1>
            <p class="text-white-50 small mb-4">{% trans "Forgotten your password? Enter your e-mail address below, and we'll send you an e-mail allowing you to reset it." %}</p>

            <form method="POST" action="{% url 'account_reset_password' %}" class="password_reset">
                {% csrf_token %}
                {{ form|crispy }}
                <button type="submit" class="btn btn-ua-gold fw-bold w-100 mt-3">
                    {% trans "Reset My Password" %}
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
