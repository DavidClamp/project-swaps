{% load static %}
<!DOCTYPE html>
<html lang="en" class="h-100">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IRSQuant | Workspace</title>
    <!-- Bootstrap 5 & Font Awesome -->
    <link href="https://cdn.jsdelivr.net" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com">
</head>
<body class="d-flex flex-column h-100 bg-light">

    <!-- Simple Workspace Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm py-3">
        <div class="container-fluid px-4">
            <a class="navbar-brand fw-bold" href="{% url 'home' %}" style="color: #C83C0D;">
                <i class="fa-solid fa-chart-line me-2"></i>IRS<span class="text-white">QUANT</span>
            </a>
            <!-- Links for Blotter and Analyser go here -->
        </div>
    </nav>

    <!-- ALERT MESSAGES BLOCK (For BlueGamma Imports) -->
    <div class="container-fluid mt-3 px-4">
        {% for message in messages %}
        <div class="alert alert-{{ message.tags }} alert-dismissible fade show shadow-sm" role="alert">
            <i class="fa-solid fa-circle-check me-2"></i> {{ message }}
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
        {% endfor %}
    </div>

    <main class="flex-shrink-0 p-4">
        {% block content %}{% endblock %}
    </main>

    <script src="https://cdn.jsdelivr.net"></script>
</body>
</html>
